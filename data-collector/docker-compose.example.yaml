services:
  backend:
    image: whaletamer/backend:latest
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: dev_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: qwerty
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dev_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: qwerty
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d dev_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  data-collector:
    image: whaletamer/data-collector:latest
    environment:
      WT_BACKEND_URL: http://backend:8000
      WT_DC_TOKEN: ${WT_DC_TOKEN}
      WT_SOURCE: "prod-server-1"
      WT_INTERVAL_SECONDS: 30
    depends_on:
      backend:
        condition: service_started

